name: Publish NuGet

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # required to create the GitHub Release

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      # The repo has no packages.lock.json, so setup-dotnet's `cache: true` (which requires
      # lock files) cannot be used - cache the global NuGet package folder directly instead.
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Stamp MCP manifest version from tag
        run: |
          jq --arg v "${{ steps.version.outputs.VERSION }}" \
            '.version = $v | .packages[0].version = $v' \
            .mcp/server.json > .mcp/server.json.tmp
          mv .mcp/server.json.tmp .mcp/server.json

      - name: Restore dependencies
        run: dotnet restore MarkdownInk.slnx

      - name: Build
        run: dotnet build MarkdownInk.slnx --no-restore -c Release

      - name: Test
        run: dotnet test MarkdownInk.slnx --no-build -c Release

      - name: Pack
        run: |
          dotnet pack src/MarkdownInk.Mcp/MarkdownInk.Mcp.csproj \
            -c Release \
            --no-build \
            -p:MinVerVersionOverride=${{ steps.version.outputs.VERSION }} \
            -o ./nupkg

      # Assert the artifact is actually correct BEFORE it leaves the building. A green
      # `dotnet pack` only means the command exited 0 - it does not prove the McpServer package
      # contains its manifest or that the manifest version matches the release. Shipping a package
      # with a missing/stale `.mcp/server.json` is exactly what would send `dnx` clients the wrong
      # version. Fail loudly here rather than discover it from a user weeks later.
      - name: Verify packaged MCP manifest
        run: |
          want="${{ steps.version.outputs.VERSION }}"
          pkg="$(ls ./nupkg/*.nupkg | head -1)"
          echo "Inspecting $pkg (expecting manifest version $want)"
          manifest="$(unzip -p "$pkg" .mcp/server.json 2>/dev/null || true)"
          if [ -z "$manifest" ]; then
            echo "::error::.mcp/server.json is missing from $pkg - the McpServer package would ship without its manifest, so dnx clients cannot resolve it correctly."
            exit 1
          fi
          got_top="$(echo "$manifest" | jq -r '.version')"
          got_pkg="$(echo "$manifest" | jq -r '.packages[0].version')"
          echo "manifest .version=$got_top  .packages[0].version=$got_pkg"
          if [ "$got_top" != "$want" ] || [ "$got_pkg" != "$want" ]; then
            echo "::error::Packaged manifest version mismatch (expected $want, got .version=$got_top .packages[0].version=$got_pkg)."
            exit 1
          fi
          echo "Manifest OK: version $want is embedded and consistent."

      - name: Push to NuGet.org
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      # Build the MCPB bundle (one-click install for Claude Desktop and other MCPB-aware clients).
      # It just wraps the `dnx MarkdownInk.Mcp` launch, so the bundle is the stamped manifest only.
      # `mcpb pack` validates the manifest as it builds - a bad manifest fails the release here.
      - name: Build MCPB bundle
        run: |
          want="${{ steps.version.outputs.VERSION }}"
          jq --arg v "$want" '.version = $v' mcpb/manifest.json > mcpb/manifest.tmp
          mv mcpb/manifest.tmp mcpb/manifest.json
          npx -y @anthropic-ai/mcpb pack mcpb MarkdownInk.Mcp.mcpb

      # A git tag is not a GitHub Release - one must be created explicitly. Do it here, after a
      # successful NuGet push, so every published version has a matching Release with notes, the
      # .nupkg, and the .mcpb attached. Idempotent so a re-run on the same tag heals rather than errors.
      - name: Extract release notes from CHANGELOG
        run: |
          want="${{ steps.version.outputs.VERSION }}"
          # Literal string match (index==1), not regex: a version like "1.0.0" contains "."
          # metacharacters and "[" is a regex bracket-expression opener, so a dynamic regex here
          # is fragile across awk implementations. index() sidesteps all of that.
          awk -v hdr="## [$want]" '
            index($0, hdr) == 1 {f=1; next}
            f && index($0, "## [") == 1 {exit}
            f {print}
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No CHANGELOG section found for $want; using a generic note."
            echo "Release v$want" > release-notes.md
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          want="${{ steps.version.outputs.VERSION }}"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists - updating notes and assets."
            gh release edit "$GITHUB_REF_NAME" --title "v$want" --notes-file release-notes.md
            gh release upload "$GITHUB_REF_NAME" ./nupkg/*.nupkg MarkdownInk.Mcp.mcpb --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "v$want" \
              --notes-file release-notes.md \
              --verify-tag \
              ./nupkg/*.nupkg MarkdownInk.Mcp.mcpb
          fi

  # Publish the manifest to the official MCP Registry (registry.modelcontextprotocol.io) so the
  # server is discoverable by any client/aggregator that reads the registry. Separate job, gated on
  # a successful NuGet publish: the registry fetches the package from NuGet to verify ownership (an
  # `mcp-name:` marker in the packed README), so the package must exist AND be indexed first.
  publish-registry:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC token for `mcp-publisher login github-oidc` (proves the io.github.atypical-consulting namespace)
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Stamp MCP manifest version from tag
        run: |
          jq --arg v "${{ steps.version.outputs.VERSION }}" \
            '.version = $v | .packages[0].version = $v' \
            .mcp/server.json > .mcp/server.json.tmp
          mv .mcp/server.json.tmp .mcp/server.json

      # The registry pulls the .nupkg from NuGet to read the README ownership marker. NuGet runs a
      # validation pass before a new version is downloadable, so poll until it is (or the publish
      # would fail with "package not found").
      - name: Wait for NuGet to index the version
        run: |
          want="${{ steps.version.outputs.VERSION }}"
          url="https://api.nuget.org/v3-flatcontainer/markdownink.mcp/${want}/markdownink.mcp.${want}.nupkg"
          echo "Waiting for $url to be downloadable…"
          for i in $(seq 1 40); do
            code="$(curl -s -o /dev/null -w '%{http_code}' "$url")"
            if [ "$code" = "200" ]; then echo "Available after ~$((i*30))s."; exit 0; fi
            echo "attempt $i: HTTP $code — waiting 30s"; sleep 30
          done
          echo "::error::NuGet package $want was not downloadable after 20 min; registry ownership validation would fail."
          exit 1

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish .mcp/server.json
