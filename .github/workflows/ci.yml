name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # The repo has no packages.lock.json, so setup-dotnet's `cache: true` (which requires
      # lock files) cannot be used - cache the global NuGet package folder directly instead.
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore MarkdownInk.slnx

      - name: Build
        run: dotnet build MarkdownInk.slnx --no-restore -c Release

      # The test projects use the Microsoft Testing Platform (xunit.v3 with
      # TestingPlatformDotnetTestSupport), so `dotnet test` drives them directly.
      - name: Test
        run: |
          set +e
          dotnet test MarkdownInk.slnx --no-build -c Release
          code=$?
          if [ $code -ne 0 ]; then
            echo "::group::MTP test logs"
            find . -path '*TestResults*' -name '*.log' -print -exec cat {} \;
            echo "::endgroup::"
          fi
          exit $code
