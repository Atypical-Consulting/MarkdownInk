name: Deploy documentation site

# Builds the Astro site in website/ and publishes it to GitHub Pages.
# One-time setup: repository Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: npm ci || npm install
      - name: Build with Astro
        run: npm run build
        env:
          # Authenticates the build-time GitHub star-count fetch in Base.astro (avoids the
          # 60/hr unauthenticated rate limit). Read-only; the default token suffices.
          GITHUB_TOKEN: ${{ github.token }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.d3.outputs.page_url || steps.d2.outputs.page_url || steps.d1.outputs.page_url }}
    steps:
      # GitHub Pages' deployment API intermittently returns "Deployment failed, try again later" —
      # a backend hiccup unrelated to the build, which clears on a plain re-run. Try up to 3 times;
      # the first two tolerate failure so a transient miss doesn't fail the job.
      - name: Deploy to GitHub Pages (attempt 1)
        id: d1
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - name: Deploy to GitHub Pages (attempt 2)
        id: d2
        if: steps.d1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - name: Deploy to GitHub Pages (attempt 3)
        id: d3
        if: steps.d1.outcome == 'failure' && steps.d2.outcome == 'failure'
        uses: actions/deploy-pages@v4
